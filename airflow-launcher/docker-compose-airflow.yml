version: '3.8'
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__WEBSERVER__RBAC: 'true'
    DATA_DB_CONN: postgresql+psycopg2://${DATA_DB_USER}:${DATA_DB_PASSWORD}@data-db:5432/${DATA_DB_NAME}
    LAUNCHER_URL: http://host.docker.internal:${LAUNCHER_PORT}
    HOST_DAGS_PATH: ${HOST_DAGS_PATH}
    EIA_API_KEY: ${EIA_API_KEY}
    DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME}
    EIA_INGEST_CRON: ${EIA_INGEST_CRON}
    PIPELINE_CRON: ${PIPELINE_CRON}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
    data-db:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 5s
      retries: 5
    volumes:
      - airflow-db-data:/var/lib/postgresql/data

  data-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DATA_DB_USER}
      POSTGRES_PASSWORD: ${DATA_DB_PASSWORD}
      POSTGRES_DB: ${DATA_DB_NAME}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATA_DB_USER}"]
      interval: 5s
      retries: 5
    volumes:
      - data-db-data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && (airflow users create --username ${AIRFLOW_USERNAME} --password ${AIRFLOW_PASSWORD} --firstname Admin --lastname User --role Admin --email admin@example.com || true)"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-db-data:
  data-db-data: